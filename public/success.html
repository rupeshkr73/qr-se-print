<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment Successful - QR Se Print</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Space Grotesk',sans-serif; background:#f5f0e8; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }
.wrap { max-width:400px; width:100%; }
.card { background:#fff; border-radius:24px; padding:40px 24px; text-align:center; box-shadow:0 8px 40px rgba(0,0,0,0.08); }
.icon { width:80px; height:80px; border-radius:50%; background:linear-gradient(135deg,#00c853,#69f0ae); display:flex; align-items:center; justify-content:center; font-size:40px; margin:0 auto 24px; animation:pop 0.6s cubic-bezier(0.175,0.885,0.32,1.275); }
@keyframes pop { from{transform:scale(0);opacity:0} to{transform:scale(1);opacity:1} }
h2 { font-family:'Syne',sans-serif; font-size:26px; font-weight:800; margin-bottom:8px; }
.sub { color:#6b6870; font-size:15px; margin-bottom:20px; line-height:1.5; }
.order-id { display:inline-block; padding:8px 20px; background:#f5f0e8; border-radius:10px; font-size:13px; font-weight:700; color:#6b6870; letter-spacing:1px; margin-bottom:20px; }
.status-box { background:#e8f9ef; border-radius:16px; padding:16px; display:flex; align-items:center; gap:12px; text-align:left; margin-bottom:24px; }
.s-icon { font-size:28px; }
.spin { animation:spin 2s linear infinite; }
@keyframes spin { to{transform:rotate(360deg)} }
.s-title { font-size:14px; font-weight:700; color:#00c853; }
.s-sub { font-size:12px; color:#6b6870; margin-top:2px; }
.btn { width:100%; padding:14px; border-radius:14px; background:#ff4d1c; color:#fff; border:none; font-family:'Syne',sans-serif; font-size:17px; font-weight:800; cursor:pointer; }
.logo { font-family:'Syne',sans-serif; font-size:16px; font-weight:800; color:#6b6870; margin-top:20px; }
.logo span { color:#ff4d1c; }
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="icon">✓</div>
    <h2>Payment Ho Gaya!</h2>
    <p class="sub">Aapki print request successfully bhej di gayi hai printer ko</p>
    <div class="order-id" id="orderId">ORDER #...</div>
    <div class="status-box">
      <div class="s-icon spin" id="statusIcon">⚙️</div>
      <div>
        <div class="s-title" id="statusTitle">Printing in Progress...</div>
        <div class="s-sub" id="statusSub">1-2 minute mein print nikal aayega</div>
      </div>
    </div>
    <button class="btn" onclick="goBack()">Naya Print Karo</button>
    <div class="logo">QR Se <span>Print</span></div>
  </div>
</div>
<script>
const params = new URLSearchParams(location.search);
const jobId = params.get('jobId');
const shopId = params.get('shopId') || document.referrer.split('/print/')[1]?.split('?')[0];

if (jobId) {
  document.getElementById('orderId').textContent = 'ORDER #' + jobId;
  let count = 0;
  const interval = setInterval(async () => {
    try {
      const res = await fetch(`/api/jobs/status/${jobId}`);
      const data = await res.json();
      count++;
      if (data.status === 'printed') {
        document.getElementById('statusIcon').textContent = '✅';
        document.getElementById('statusIcon').style.animation = 'none';
        document.getElementById('statusTitle').textContent = 'Print Complete!';
        document.getElementById('statusSub').textContent = 'Aapka print nikal aa gaya — le lijiye!';
        clearInterval(interval);
      } else if (data.status === 'failed') {
        document.getElementById('statusIcon').textContent = '❌';
        document.getElementById('statusIcon').style.animation = 'none';
        document.getElementById('statusTitle').textContent = 'Print Failed';
        document.getElementById('statusSub').textContent = 'Shop owner se contact karo';
        clearInterval(interval);
      }
      if (count > 30) clearInterval(interval);
    } catch(e) {}
  }, 5000);
}

function goBack() {
  if (shopId) location.href = '/print/' + shopId;
  else location.href = '/';
}
</script>
</body>
</html>
